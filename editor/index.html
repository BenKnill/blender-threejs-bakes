<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blender Three.js Bake Editor</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three.module.js",
          "three/addons/": "./vendor/"
        }
      }
    </script>
  </head>
  <body>
    <main id="app">
      <section id="viewport" aria-label="3D layout viewport" data-testid="viewport">
        <div id="viewportHud" class="viewportHud" aria-hidden="true" data-testid="viewport-hud">
          <span id="hudMode" class="hudMode" data-testid="hud-mode">Move</span>
          <span id="hudSelection" class="hudSelection" data-testid="hud-selection">
            nothing selected
          </span>
          <span class="hudKeys">click to select · G move · R rotate · S scale</span>
        </div>
      </section>

      <aside id="sidebar" aria-label="Layout controls" data-testid="sidebar">
        <header class="topbar">
          <div>
            <h1>Bake Layout</h1>
            <p id="manifestStatus" data-testid="manifest-status">Loading manifest...</p>
          </div>
          <button
            id="saveCamera"
            type="button"
            title="Save current view as render camera"
            aria-label="Save current view as render camera"
            data-testid="save-camera"
          >
            Save Camera
          </button>
        </header>

        <label class="field">
          <span>Layout name</span>
          <input
            id="layoutName"
            type="text"
            value="first_composition"
            autocomplete="off"
            data-testid="layout-name"
          />
        </label>

        <div class="toolrow" role="group" aria-label="Transform mode" data-testid="mode-controls">
          <button
            id="modeTranslate"
            type="button"
            title="Move (G)"
            aria-label="Move selected instance"
            aria-pressed="false"
            data-testid="mode-translate"
          >
            Move
          </button>
          <button
            id="modeRotate"
            type="button"
            title="Rotate (R)"
            aria-label="Rotate selected instance"
            aria-pressed="false"
            data-testid="mode-rotate"
          >
            Rotate
          </button>
          <button
            id="modeScale"
            type="button"
            title="Scale (S)"
            aria-label="Scale selected instance"
            aria-pressed="false"
            data-testid="mode-scale"
          >
            Scale
          </button>
        </div>

        <section class="panel">
          <h2>Assets</h2>
          <div
            id="assetPalette"
            class="list"
            role="group"
            aria-label="Available assets"
            data-testid="asset-palette"
          ></div>
        </section>

        <section class="panel">
          <div class="panelHeader">
            <h2>Instances</h2>
            <div class="minirow">
              <button
                id="duplicateInstance"
                type="button"
                title="Duplicate selected instance"
                aria-label="Duplicate selected instance"
                data-testid="duplicate-instance"
              >
                Duplicate
              </button>
              <button
                id="deleteInstance"
                type="button"
                title="Delete selected instance"
                aria-label="Delete selected instance"
                data-testid="delete-instance"
              >
                Delete
              </button>
            </div>
          </div>
          <div
            id="instanceList"
            class="list"
            role="group"
            aria-label="Layout instances"
            data-testid="instance-list"
          ></div>
        </section>

        <section class="panel inspectorPanel" data-testid="instance-inspector">
          <h2>Selected Instance</h2>
          <div class="gridFields">
            <label class="field">
              <span>Pos X</span>
              <input
                id="instancePositionX"
                type="number"
                step="0.01"
                data-testid="instance-position-x"
              />
            </label>
            <label class="field">
              <span>Pos Y</span>
              <input
                id="instancePositionY"
                type="number"
                step="0.01"
                data-testid="instance-position-y"
              />
            </label>
            <label class="field">
              <span>Pos Z</span>
              <input
                id="instancePositionZ"
                type="number"
                step="0.01"
                data-testid="instance-position-z"
              />
            </label>
          </div>
          <div class="gridFields">
            <label class="field">
              <span>Rot X</span>
              <input
                id="instanceRotationX"
                type="number"
                step="1"
                data-testid="instance-rotation-x"
              />
            </label>
            <label class="field">
              <span>Rot Y</span>
              <input
                id="instanceRotationY"
                type="number"
                step="1"
                data-testid="instance-rotation-y"
              />
            </label>
            <label class="field">
              <span>Rot Z</span>
              <input
                id="instanceRotationZ"
                type="number"
                step="1"
                data-testid="instance-rotation-z"
              />
            </label>
          </div>
          <div class="gridFields scaleFields">
            <label class="field">
              <span>Uniform</span>
              <input
                id="instanceUniformScale"
                type="number"
                min="0.0005"
                step="0.01"
                data-testid="instance-uniform-scale"
              />
            </label>
            <label class="field">
              <span>Scale X</span>
              <input
                id="instanceScaleX"
                type="number"
                min="0.0005"
                step="0.01"
                data-testid="instance-scale-x"
              />
            </label>
            <label class="field">
              <span>Scale Y</span>
              <input
                id="instanceScaleY"
                type="number"
                min="0.0005"
                step="0.01"
                data-testid="instance-scale-y"
              />
            </label>
            <label class="field">
              <span>Scale Z</span>
              <input
                id="instanceScaleZ"
                type="number"
                min="0.0005"
                step="0.01"
                data-testid="instance-scale-z"
              />
            </label>
          </div>
        </section>

        <section class="panel inspectorPanel" data-testid="camera-inspector">
          <div class="panelHeader">
            <h2>Camera</h2>
          </div>
          <div class="gridFields">
            <label class="field">
              <span>Pos X</span>
              <input
                id="cameraPositionX"
                type="number"
                step="0.01"
                data-testid="camera-position-x"
              />
            </label>
            <label class="field">
              <span>Pos Y</span>
              <input
                id="cameraPositionY"
                type="number"
                step="0.01"
                data-testid="camera-position-y"
              />
            </label>
            <label class="field">
              <span>Pos Z</span>
              <input
                id="cameraPositionZ"
                type="number"
                step="0.01"
                data-testid="camera-position-z"
              />
            </label>
          </div>
          <div class="gridFields">
            <label class="field">
              <span>Target X</span>
              <input id="cameraTargetX" type="number" step="0.01" data-testid="camera-target-x" />
            </label>
            <label class="field">
              <span>Target Y</span>
              <input id="cameraTargetY" type="number" step="0.01" data-testid="camera-target-y" />
            </label>
            <label class="field">
              <span>Target Z</span>
              <input id="cameraTargetZ" type="number" step="0.01" data-testid="camera-target-z" />
            </label>
          </div>
          <label class="field cameraFovField">
            <span>FOV</span>
            <input
              id="cameraFov"
              type="number"
              min="1"
              max="160"
              step="1"
              data-testid="camera-fov"
            />
          </label>
        </section>

        <section class="panel">
          <h2>Render</h2>
          <div class="gridFields">
            <label class="field">
              <span>Width</span>
              <input
                id="renderWidth"
                type="number"
                min="64"
                step="1"
                value="1920"
                data-testid="render-width"
              />
            </label>
            <label class="field">
              <span>Height</span>
              <input
                id="renderHeight"
                type="number"
                min="64"
                step="1"
                value="1080"
                data-testid="render-height"
              />
            </label>
            <label class="field">
              <span>Samples</span>
              <input
                id="renderSamples"
                type="number"
                min="1"
                step="1"
                value="256"
                data-testid="render-samples"
              />
            </label>
          </div>
        </section>

        <section class="panel">
          <h2>Lighting</h2>
          <label class="field">
            <span>Preset</span>
            <select id="lightingPreset" data-testid="lighting-preset"></select>
          </label>
          <div class="gridFields lightingFields">
            <label class="field">
              <span>Azimuth</span>
              <input
                id="sunAzimuth"
                type="number"
                min="0"
                max="360"
                step="1"
                data-testid="sun-azimuth"
              />
            </label>
            <label class="field">
              <span>Elevation</span>
              <input
                id="sunElevation"
                type="number"
                min="-10"
                max="90"
                step="1"
                data-testid="sun-elevation"
              />
            </label>
            <label class="field">
              <span>Sun</span>
              <input id="sunColor" type="color" data-testid="sun-color" />
            </label>
            <label class="field">
              <span>Strength</span>
              <input id="sunStrength" type="number" min="0" step="0.1" data-testid="sun-strength" />
            </label>
            <label class="field">
              <span>Softness</span>
              <input
                id="sunAngle"
                type="number"
                min="0.1"
                max="20"
                step="0.1"
                data-testid="sun-angle"
              />
            </label>
            <label class="field">
              <span>World</span>
              <select id="worldType" data-testid="world-type">
                <option value="sky">Sky</option>
                <option value="color">Color</option>
              </select>
            </label>
            <label class="field">
              <span>Ambient</span>
              <input
                id="worldStrength"
                type="number"
                min="0"
                step="0.05"
                data-testid="world-strength"
              />
            </label>
            <label class="field">
              <span>World color</span>
              <input id="worldColor" type="color" data-testid="world-color" />
            </label>
            <label class="field">
              <span>Exposure</span>
              <input id="exposure" type="number" step="0.05" data-testid="exposure" />
            </label>
          </div>
        </section>

        <section class="panel">
          <div class="panelHeader">
            <h2>Renders</h2>
            <button
              id="refreshRenders"
              type="button"
              title="Refresh render thumbnails"
              aria-label="Refresh render thumbnails"
              data-testid="refresh-renders"
            >
              Refresh
            </button>
          </div>
          <p id="renderStatus" class="statusLine" data-testid="render-status"></p>
          <div
            id="renderGallery"
            class="renderGallery"
            role="group"
            aria-label="Recent renders"
            data-testid="render-gallery"
          ></div>
        </section>

        <footer class="actions">
          <button id="exportLayout" type="button" data-testid="export-layout">Export Layout</button>
          <button id="saveForBake" type="button" data-testid="save-for-bake">Send Layout</button>
          <button id="bakeLayout" type="button" data-testid="bake-layout">Bake</button>
          <label class="loadButton" data-testid="load-layout-control">
            Load Layout
            <input
              id="loadLayout"
              type="file"
              accept=".json,.layout.json,application/json"
              aria-label="Load layout JSON"
              data-testid="load-layout"
            />
          </label>
        </footer>
      </aside>
    </main>
    <script type="module" src="./editor.js"></script>
  </body>
</html>
